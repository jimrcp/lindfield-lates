<!--
  =============================================
  LINDFIELD LATES — Shopify Embed Snippet
  =============================================

  Paste this into the Shopify theme via:
  Online Store → Themes → Edit theme →
  Lindfield Lates page → Add section → Custom Liquid

  HOW IT WORKS:
  - Shows a centred "Book a Table" button
  - On click, opens the booking page in a new tab
  =============================================
-->

<style>
  .lcw-book-btn {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    padding: 0.9rem 2rem;
    font-size: 0.95rem;
    font-weight: 700;
    font-family: 'Anonymous Pro', monospace;
    letter-spacing: 0.04em;
    color: #f4f4f6;
    background: #2d3042;
    border: none;
    border-radius: 40px;
    box-shadow: 0px 2px 0px rgba(45, 48, 66, 0.15);
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    text-decoration: none;
  }
  .lcw-book-btn:hover {
    transform: translateY(-1px);
    box-shadow: 0px 4px 0px rgba(45, 48, 66, 0.15);
  }
  .lcw-book-btn:active {
    transform: translateY(1px);
    box-shadow: 0px 0px 0px rgba(45, 48, 66, 0.15);

  .lcw-book-btn svg {
    width: 18px;
    height: 18px;
